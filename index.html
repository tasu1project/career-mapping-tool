<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職種×資格マッピングツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --primary: #1A56DB;
    --primary-light: #EEF3FF;
    --accent: #F59E0B;
    --accent-light: #FFFBEB;
    --text: #111827;
    --text-sub: #6B7280;
    --border: #E5E7EB;
    --tag-bg: #F3F4F6;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--primary);
    color: white;
    padding: 20px 16px 16px;
    text-align: center;
  }

  header h1 {
    font-size: 1.3rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.3;
  }

  header p {
    font-size: 0.78rem;
    opacity: 0.85;
    margin-top: 6px;
    line-height: 1.6;
  }

  .search-area {
    background: var(--surface);
    padding: 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: var(--shadow);
  }

  .search-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"] {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--primary);
  }

  button.search-btn {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
  }

  .category-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 10px 0 2px;
    scrollbar-width: none;
  }
  .category-scroll::-webkit-scrollbar { display: none; }

  .cat-chip {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    color: var(--text-sub);
    transition: all 0.15s;
    font-family: inherit;
  }

  .cat-chip.active, .cat-chip:hover {
    background: var(--primary-light);
    color: var(--primary);
    border-color: var(--primary);
  }

  .main {
    padding: 16px;
    max-width: 700px;
    margin: 0 auto;
  }

  .result-header {
    font-size: 0.8rem;
    color: var(--text-sub);
    margin-bottom: 12px;
    padding: 0 2px;
  }

  .result-header strong {
    color: var(--primary);
    font-weight: 700;
  }

  .job-card {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .job-card-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .job-icon {
    font-size: 1.4rem;
    flex-shrink: 0;
    line-height: 1;
    margin-top: 2px;
  }

  .job-info { flex: 1; }

  .job-name {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
  }

  .job-desc {
    font-size: 0.78rem;
    color: var(--text-sub);
    margin-top: 3px;
    line-height: 1.5;
  }

  .cat-label {
    font-size: 0.7rem;
    background: var(--primary-light);
    color: var(--primary);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .toggle-icon {
    color: var(--text-sub);
    font-size: 0.8rem;
    flex-shrink: 0;
    margin-top: 4px;
    transition: transform 0.2s;
  }

  .job-card.open .toggle-icon {
    transform: rotate(180deg);
  }

  .skills-section {
    padding: 0 16px 14px;
    display: none;
    border-top: 1px solid var(--border);
  }

  .job-card.open .skills-section {
    display: block;
  }

  .skills-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 12px 0 8px;
  }

  .skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 4px;
  }

  .skill-tag {
    font-size: 0.78rem;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    color: var(--text);
    font-weight: 500;
  }

  .cert-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .cert-item:last-child { border-bottom: none; }

  .cert-level {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .level-easy { background: #D1FAE5; color: #065F46; }
  .level-mid  { background: #FEF3C7; color: #92400E; }
  .level-hard { background: #FEE2E2; color: #991B1B; }

  .cert-info { flex: 1; }

  .cert-name {
    font-size: 0.88rem;
    font-weight: 700;
    line-height: 1.3;
  }

  .cert-meta {
    font-size: 0.73rem;
    color: var(--text-sub);
    margin-top: 2px;
    line-height: 1.5;
  }

  .cert-merit {
    font-size: 0.75rem;
    color: #065F46;
    background: #D1FAE5;
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-top: 4px;
  }

  .request-box {
    background: var(--accent-light);
    border: 1px dashed var(--accent);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin-top: 8px;
  }

  .request-box p {
    font-size: 0.85rem;
    color: #92400E;
    font-weight: 500;
    line-height: 1.6;
  }

  .request-box a {
    color: var(--primary);
    font-weight: 700;
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-sub);
    font-size: 0.9rem;
    line-height: 1.8;
  }

  footer {
    text-align: center;
    padding: 20px 16px;
    font-size: 0.72rem;
    color: var(--text-sub);
    line-height: 1.8;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
</style>

const CATS = ["すべて", ...Array.from(new Set(DATA.map(d => d.cat)))];
let activeCat = "すべて";

function init() {
  const chips = document.getElementById("catChips");
  CATS.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "cat-chip" + (c === activeCat ? " active" : "");
    btn.textContent = c;
    btn.onclick = () => { activeCat = c; document.querySelectorAll(".cat-chip").forEach(b => b.classList.remove("active")); btn.classList.add("active"); render(); };
    chips.appendChild(btn);
  });
  render();
}

function render() {
  const q = document.getElementById("searchInput").value.trim();
  let filtered = DATA;
  if (activeCat !== "すべて") filtered = filtered.filter(d => d.cat === activeCat);
  if (q) {
    const kw = q.toLowerCase();
    filtered = filtered.filter(d =>
      d.name.includes(kw) || d.cat.includes(kw) || d.desc.includes(kw) || d.skills.some(s => s.includes(kw))
    );
  }

  const header = document.getElementById("resultHeader");
  header.innerHTML = q
    ? `「<strong>${q}</strong>」の検索結果：${filtered.length}件`
    : `${activeCat === "すべて" ? "全職種" : activeCat}：${filtered.length}件`;

  const container = document.getElementById("results");
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty">😅 「${q}」に一致する職種が見つかりませんでした。<br>下のリクエスト欄からお知らせください！</div>`;
    return;
  }

  container.innerHTML = filtered.map(d => `
    <div class="job-card" id="card-${d.id}">
      <div class="job-card-header" onclick="toggle('${d.id}')">
        <div class="job-icon">${d.icon}</div>
        <div class="job-info">
          <div class="job-name">${d.name}</div>
          <div class="job-desc">${d.desc}</div>
        </div>
        <div class="cat-label">${d.cat}</div>
        <div class="toggle-icon">▼</div>
      </div>
      <div class="skills-section">
        <div class="skills-label">この仕事で求められるスキル</div>
        <div class="skill-tags">${d.skills.map(s => `<span class="skill-tag">${s}</span>`).join("")}</div>
        <div class="skills-label" style="margin-top:14px">おすすめ資格・検定</div>
        ${d.certs.map(c => `
          <div class="cert-item">
            <span class="cert-level ${c.level === 'easy' ? 'level-easy' : c.level === 'mid' ? 'level-mid' : 'level-hard'}">
              ${c.level === 'easy' ? '入門' : c.level === 'mid' ? '中級' : '上級'}
            </span>
            <div class="cert-info">
              <div class="cert-name">${c.name}</div>
              <div class="cert-meta">📅 目安期間：${c.period}　💴 受験料：${c.cost}</div>
              <span class="cert-merit">✅ ${c.merit}</span>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

function toggle(id) {
  document.getElementById("card-" + id).classList.toggle("open");
}

init();
